<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker 새로고침 중...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #F9FAFB; color: #6B7280; }
    .spinner { width: 36px; height: 36px; border: 3px solid #E5E7EB; border-top-color: #6366F1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>캐시를 초기화하고 있어요...</p>
  <script>
    (async function () {
      try {
        // 1. 서비스 워커 전체 해제
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
        }
        // 2. 캐시 스토리지 전체 삭제
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }
      } catch (e) {}
      // 3. 타임스탬프 붙여 메인 앱으로 이동 (CDN 캐시 우회)
      location.replace('/finance-tracker/?nocache=' + Date.now());
    })();
  </script>
</body>
</html>
