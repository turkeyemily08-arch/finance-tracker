<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/finance-tracker/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>finance-tracker</title>
    <script>
      // 배포할 때마다 version.json이 갱신됨
      // 저장된 버전과 다르면 새 URL로 이동 → 카카오 등 인앱브라우저 캐시 우회
      (function () {
        if (/[?&]v=/.test(location.search)) return; // 이미 리다이렉트된 경우 중단
        fetch('data/version.json?t=' + Date.now(), { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var KEY = '_fv';
            var prev = localStorage.getItem(KEY);
            localStorage.setItem(KEY, d.v);
            if (prev && prev !== d.v) {
              // 새 버전 감지 → 캐시 없는 새 URL로 강제 이동
              location.replace(location.pathname + '?v=' + d.v);
            }
          })
          .catch(function () {});
      })();
    </script>
    <script type="module" crossorigin src="/finance-tracker/assets/index-CuwFO6I4.js"></script>
    <link rel="stylesheet" crossorigin href="/finance-tracker/assets/index-C_n36qot.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
